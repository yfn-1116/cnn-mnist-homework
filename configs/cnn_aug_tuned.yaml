seed: 42
device: cuda

data:
  dataset: MNIST
  root: ./data
  batch_size: 64
  num_workers: 2
  normalize: true
  augmentation: true

model:
  name: cnn
  num_classes: 10
  dropout: 0.3
  use_batchnorm: true
  init_method: he

train:
  epochs: 10
  lr: 0.0005
  weight_decay: 0.00005

optimizer:
  name: adamw

scheduler:
  use: false

output:
  checkpoint_dir: outputs/checkpoints
  figure_dir: outputs/figures
  log_dir: outputs/logs
  prediction_dir: outputs/predictions
