seed: 42
device: cuda

data:
  dataset: MNIST
  root: ./data
  batch_size: 64
  num_workers: 2
  normalize: true
  augmentation: false

model:
  name: mlp
  input_dim: 784
  hidden_dims: [256, 128]
  num_classes: 10
  dropout: 0.0

train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0

optimizer:
  name: adam

scheduler:
  use: false

output:
  checkpoint_dir: outputs/checkpoints
  figure_dir: outputs/figures
  log_dir: outputs/logs
  prediction_dir: outputs/predictions
